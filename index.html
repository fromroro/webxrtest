<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebXR A-Frame GLB 인터랙션 (크기 수정)</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    /*
      클릭 시 색 변경 기능
    */
    AFRAME.registerComponent('custom-interaction', {
      init: function () {
        const el = this.el;
        const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6C5CE7', '#00C853'];
        let colorIndex = 0;

        el.addEventListener('click', () => {
          const mesh = el.getObject3D('mesh');
          if (!mesh) return;

          colorIndex = (colorIndex + 1) % colors.length;
          const nextColor = new THREE.Color(colors[colorIndex]);

          mesh.traverse((node) => {
            if (node.isMesh && node.material) {
              node.material = node.material.clone();
              node.material.color = nextColor;
            }
          });
        });
      }
    });
  </script>

  <a-scene>
    <a-assets>
      <a-asset-item id="myModel" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- 하늘 -->
    <a-sky color="#BFE7FF"></a-sky>

    <!-- 바닥 -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="30"
      height="30"
      color="#8BC34A">
    </a-plane>

    <!-- 조명 -->
    <a-entity light="type: ambient; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; intensity: 1" position="3 6 2"></a-entity>

    <!--
      🔥 핵심 수정 부분
      scale 값을 크게 변경하면 모델이 커집니다.
      기본: 1 1 1 → 변경: 3 3 3 (원하면 더 키우세요)
    -->
    <a-entity
      class="clickable"
      gltf-model="#myModel"
      position="0 0 -3"
      scale="3 3 3"
      custom-interaction>
    </a-entity>

    <!-- 카메라 -->
    <a-entity position="0 1.6 3">
      <a-entity
        camera
        look-controls
        wasd-controls="acceleration: 20">

        <a-cursor raycaster="objects: .clickable"></a-cursor>
      </a-entity>

      <!-- VR 컨트롤러 -->
      <a-entity
        laser-controls="hand: left"
        raycaster="objects: .clickable">
      </a-entity>

      <a-entity
        laser-controls="hand: right"
        raycaster="objects: .clickable">
      </a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
