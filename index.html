<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebXR 첫 실습</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
  <a-scene background="color: #ECECEC" vr-mode-ui="enabled: true">
    
    <a-assets>
      <a-asset-item id="mymodel" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- 플레이어(카메라 + VR 컨트롤러) -->
    <a-entity id="rig" position="0 0 0">
      <a-camera position="0 1.6 0"></a-camera>
      <a-entity laser-controls="hand: left"></a-entity>
      <a-entity laser-controls="hand: right"></a-entity>
    </a-entity>

    <!-- 3D 모델 -->
    <a-entity
      gltf-model="#mymodel"
      position="0 1.2 -1.5"
      rotation="0 45 0"
      scale="10 10 10">
    </a-entity>

    <!-- 바닥 -->
    <a-plane
      position="0 0 -3"
      rotation="-90 0 0"
      width="20"
      height="20"
      color="#DCDCDC">
    </a-plane>

    <!-- 하늘 -->
    <a-sky color="#CFE8FF"></a-sky>

    <!-- 조명 -->
    <a-entity light="type: ambient; intensity: 1"></a-entity>
    <a-entity light="type: directional; intensity: 1" position="1 3 2"></a-entity>

  </a-scene>
</body>
</html>
